name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle 8.8 explicitly
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.8

      - name: Clean Gradle
        run: ./gradlew clean

      - name: Verify Gradle version
        run: ./gradlew --version

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: hotbargrid-mod
          path: build/libs/*.jar
