name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: hotbargrid-mod
          path: build/libs/*.jar
